<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>Volume Control</h1>
        <div class="slider-container">
            <input type="range" id="volume-slider" min="0" max="400" value="100" step="10">
            <div id="volume-display">100%</div>
        </div>
        <div class="controls-grid">
            <button id="mute-btn" class="shortcut-btn icon-btn">Mute</button>
            <button class="shortcut-btn" data-value="50">50%</button>
            <button class="shortcut-btn" data-value="100">100%</button>
            <button class="shortcut-btn" data-value="200">200%</button>
            <button class="shortcut-btn" data-value="300">300%</button>
            <button class="shortcut-btn" data-value="400">400%</button>
        </div>
        <div class="toggle-container">
            <input type="checkbox" id="domain-toggle">
            <label for="domain-toggle">Remember for this website</label>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
